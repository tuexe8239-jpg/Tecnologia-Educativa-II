<!DOCTYPE html>
<html>
  <head>
    <title>Modelos 3D AR - Tecnologías Emergentes</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

      <!-- MARCADOR HIRO: Muestra una red neuronal animada -->
      <a-marker preset="hiro">

        <!-- Base: esfera central (neurona) -->
        <a-sphere
          position="0 0.5 0"
          radius="0.15"
          color="#00FFFF"
          animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; loop: true; dur: 1000; easing: easeInOutSine; dir: alternate">
        </a-sphere>

        <!-- Anillo giratorio exterior -->
        <a-torus
          position="0 0.5 0"
          radius="0.4"
          radius-tubular="0.02"
          color="#FF00FF"
          animation="property: rotation; from: 0 0 0; to: 360 360 0; loop: true; dur: 4000; easing: linear">
        </a-torus>

        <!-- Segundo anillo en otro eje -->
        <a-torus
          position="0 0.5 0"
          radius="0.6"
          radius-tubular="0.02"
          color="#00FF88"
          animation="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 6000; easing: linear">
        </a-torus>

        <!-- Cubos orbitando (neuronas secundarias) -->
        <a-box
          position="0.5 0.5 0"
          width="0.1" height="0.1" depth="0.1"
          color="#FFFF00"
          animation__rot="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 3000; easing: linear"
          animation__col="property: color; from: #FFFF00; to: #FF4400; loop: true; dur: 1500; dir: alternate">
        </a-box>

        <a-box
          position="-0.5 0.5 0"
          width="0.1" height="0.1" depth="0.1"
          color="#FF4400"
          animation__rot="property: rotation; from: 0 0 0; to: 0 -360 0; loop: true; dur: 3000; easing: linear">
        </a-box>

        <!-- Texto flotante -->
        <a-text
          value="Red Neuronal"
          position="-0.4 1.1 0"
          scale="0.5 0.5 0.5"
          color="#FFFFFF"
          animation="property: position; from: -0.4 1.1 0; to: -0.4 1.3 0; loop: true; dur: 1500; dir: alternate; easing: easeInOutSine">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
